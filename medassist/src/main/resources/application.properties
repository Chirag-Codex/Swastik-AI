# Application
spring.application.name=medassist

spring.security.enabled=${SPRING_SECURITY_ENABLED:true}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://swastik-ai-omega.vercel.app}

# These values must be provided by the deployment environment.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.ai.chat.memory.repository.jdbc.initialize-schema=${CHAT_MEMORY_INIT_SCHEMA:never}


spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.model=${GEMINI_CHAT_MODEL:gemini-3.5-flash}
spring.ai.google.genai.chat.options.max-output-tokens=512
# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.location=${java.io.tmpdir}

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.swastikai.medassist=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.web.multipart=DEBUG

tavily.api-key=${TAVILY_API_KEY}

# SQL Init
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.platform=mysql

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
